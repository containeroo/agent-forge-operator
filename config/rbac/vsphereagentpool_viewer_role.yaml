# This rule is not used by the project agent-forge-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to agentforge.containeroo.ch resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: agent-forge-operator
    app.kubernetes.io/managed-by: kustomize
  name: vsphereagentpool-viewer-role
rules:
- apiGroups:
  - agentforge.containeroo.ch
  resources:
  - vsphereagentpools
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agentforge.containeroo.ch
  resources:
  - vsphereagentpools/status
  verbs:
  - get
