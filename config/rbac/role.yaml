---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
- apiGroups:
  - agent-forge.containeroo.ch
  resources:
  - vsphereagentpools
  - vsphereagents
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agent-forge.containeroo.ch
  resources:
  - vsphereagentpools/finalizers
  - vsphereagents/finalizers
  verbs:
  - update
- apiGroups:
  - agent-forge.containeroo.ch
  resources:
  - vsphereagentpools/status
  - vsphereagents/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - agent-install.openshift.io
  resources:
  - agents
  - infraenvs
  verbs:
  - delete
  - get
  - list
  - patch
  - watch
- apiGroups:
  - capi-provider.agent-install.openshift.io
  resources:
  - agentmachines
  verbs:
  - get
  - list
  - patch
  - watch
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - machines
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
  - update
