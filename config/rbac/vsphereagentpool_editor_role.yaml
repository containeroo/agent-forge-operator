# This rule is not used by the project agent-forge-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the agent-forge.containeroo.ch.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: agent-forge-operator
    app.kubernetes.io/managed-by: kustomize
  name: vsphereagentpool-editor-role
rules:
- apiGroups:
  - agent-forge.containeroo.ch
  resources:
  - vsphereagentpools
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agent-forge.containeroo.ch
  resources:
  - vsphereagentpools/status
  verbs:
  - get
